$activeBorderColor = rgb(2E8AE6)

decoration {
    # CRT phosphor pass — scanlines, aperture grille, vignette.
    # SUPER+F10 ("degauss") toggles it live; other themes clear it on switch.
    screen_shader = $HOME/.config/omarchy/current/theme/shaders/crt-ps1.glsl
}

general {
    # the four PlayStation logo colors, swirling
    col.active_border = rgb(E23B2E) rgb(F5C400) rgb(1FBF61) rgb(2E8AE6) 45deg
    col.inactive_border = rgb(26262C)
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
}

animations {
    bezier = psSnap, 0.2, 0.9, 0.1, 1
    bezier = psLinear, 0, 0, 1, 1

    # CRT-snap: windows pop like a screen powering on
    animation = windowsIn, 1, 3, psSnap, popin 85%
    animation = windowsOut, 1, 2, psLinear, popin 92%
    animation = windowsMove, 1, 3, psSnap

    animation = layersIn, 1, 3, psSnap, popin 88%
    animation = layersOut, 1, 1.5, psLinear, fade

    animation = workspaces, 1, 4, psSnap, slide

    # the logo-swirl: rainbow gradient orbits the active frame
    # `loop` redraws continuously; change to `once` to save GPU/battery.
    animation = border, 1, 4, psSnap
    animation = borderangle, 1, 100, psLinear, loop
}
